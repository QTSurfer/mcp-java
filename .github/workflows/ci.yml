name: CI

on:
  push:
    branches: [main]
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build, unit tests + integration tests
        run: mvn -B verify

  native:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-amd64
            binary: qtsurfer-mcp
            asset: qtsurfer-mcp-linux-amd64
          - os: macos-latest
            label: macos-arm64
            binary: qtsurfer-mcp
            asset: qtsurfer-mcp-macos-arm64
          - os: windows-latest
            label: windows-amd64
            binary: qtsurfer-mcp.exe
            asset: qtsurfer-mcp-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: 'maven'
      - name: Sync OS CA certificates into GraalVM JDK
        shell: bash
        run: |
          CACERTS="$JAVA_HOME/lib/security/cacerts"

          # 1. Import root CAs from the OS trust store
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            security export -t certs -f pemseq \
              -k /System/Library/Keychains/SystemRootCertificates.keychain \
              > /tmp/os-roots.pem
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            cat /etc/ssl/certs/*.pem > /tmp/os-roots.pem 2>/dev/null || true
          fi
          if [[ -f /tmp/os-roots.pem ]]; then
            awk '/-----BEGIN CERTIFICATE-----/{n++; close(f); f="/tmp/ca-"n".pem"} {print > f}' \
              /tmp/os-roots.pem
            imported=0
            for f in /tmp/ca-*.pem; do
              [[ -s "$f" ]] || continue
              hash=$(openssl x509 -noout -hash -in "$f" 2>/dev/null) || continue
              keytool -importcert -noprompt -trustcacerts \
                -alias "os-root-${hash}" \
                -keystore "$CACERTS" -storepass changeit \
                -file "$f" 2>/dev/null && ((imported++)) || true
            done
            echo "Imported $imported root CAs from OS"
          fi

          # 2. Fetch any intermediate CAs the server omits from its TLS chain (via AIA).
          #    GraalVM native images cannot chase AIA at runtime; bake the intermediates in.
          AIA_URL=$(echo | openssl s_client -connect api.qtsurfer.net:443 \
            -servername api.qtsurfer.net 2>/dev/null \
            | openssl x509 -noout -text 2>/dev/null \
            | grep "CA Issuers" | grep -o 'http[^ ]*' | head -1)
          if [[ -n "$AIA_URL" ]]; then
            curl -sf "$AIA_URL" -o /tmp/intermediate.der
            openssl x509 -inform der -in /tmp/intermediate.der -out /tmp/intermediate.pem 2>/dev/null \
              || cp /tmp/intermediate.der /tmp/intermediate.pem
            hash=$(openssl x509 -noout -hash -in /tmp/intermediate.pem 2>/dev/null)
            subj=$(openssl x509 -noout -subject -in /tmp/intermediate.pem 2>/dev/null)
            keytool -importcert -noprompt -trustcacerts \
              -alias "intermediate-${hash}" \
              -keystore "$CACERTS" -storepass changeit \
              -file /tmp/intermediate.pem 2>/dev/null \
              && echo "Imported intermediate CA: ${subj}" \
              || echo "Intermediate already trusted: ${subj}"
          fi
      - name: Set up MSVC (required by GraalVM native-image on Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build native binary
        run: mvn -B -Pnative -DskipTests package native:compile-no-fork
      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: target/${{ matrix.binary }}
          retention-days: 1

  release:
    needs: [build, native]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build fat JAR
        run: mvn -B package -DskipTests
      - name: Download native binaries
        uses: actions/download-artifact@v4
        with:
          path: native-binaries
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          awk "/^## \[${GITHUB_REF_NAME}\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > /tmp/release-notes.md
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md
      - name: Upload fat JAR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          JAR=$(ls target/mcp-java-*.jar | grep -v 'original-' | head -1)
          cp "$JAR" "qtsurfer-mcp-java-${GITHUB_REF_NAME}.jar"
          cp "$JAR" "qtsurfer-mcp-java.jar"
          gh release upload "$GITHUB_REF_NAME" \
            "qtsurfer-mcp-java-${GITHUB_REF_NAME}.jar" \
            "qtsurfer-mcp-java.jar"
      - name: Upload native binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv native-binaries/qtsurfer-mcp-linux-amd64/qtsurfer-mcp \
             native-binaries/qtsurfer-mcp-linux-amd64/qtsurfer-mcp-linux-amd64
          mv native-binaries/qtsurfer-mcp-macos-arm64/qtsurfer-mcp \
             native-binaries/qtsurfer-mcp-macos-arm64/qtsurfer-mcp-macos-arm64
          mv "native-binaries/qtsurfer-mcp-windows-amd64.exe/qtsurfer-mcp.exe" \
             "native-binaries/qtsurfer-mcp-windows-amd64.exe/qtsurfer-mcp-windows-amd64.exe"
          gh release upload "$GITHUB_REF_NAME" \
            native-binaries/qtsurfer-mcp-linux-amd64/qtsurfer-mcp-linux-amd64 \
            native-binaries/qtsurfer-mcp-macos-arm64/qtsurfer-mcp-macos-arm64 \
            "native-binaries/qtsurfer-mcp-windows-amd64.exe/qtsurfer-mcp-windows-amd64.exe"
